<!DOCTYPE html>
<html>

<head>
  <title>NexvoraDigitals-Poster's</title>

  <!-- Basic favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <!-- PNG favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="frontend\assests\logo.png">
  <link rel="icon" type="image/png" sizes="16x16" href="frontend\assests\logo.png">



  <!-- Optional: theme color -->
  <meta name="theme-color" content="#0a0a0a">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0028, #2a0066);
      color: white;
    }

    /* TITLE */
    h1 {
      text-align: center;
      padding: 25px;
    }

    /* GRID */
    .container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    @media (min-width: 768px) {
      .container {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .container {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* CARD */
    .card {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 20px rgba(255, 0, 150, 0.3);
    }

    /* VIDEO FRAME */
    .video-frame {
      width: 100%;
      height: 420px;
      border: none;
      background: black;
    }

    /* MOBILE FIX */
    @media (max-width: 480px) {
      .video-frame {
        height: 300px;
      }
    }
  </style>
</head>

<body>

  <h1>Posters</h1>

  <div class="container">

    <!-- VIDEO 1 -->
    <div class="card">
      <iframe class="video-frame" src="https://drive.google.com/file/d/1r7NW-TMkh3gxwnE1Zthk_YWvlJX6_CAR/preview"
        allow="autoplay">
      </iframe>
    </div>

    <!-- VIDEO 2 -->
    <div class="card">
      <iframe class="video-frame" src="https://drive.google.com/file/d/1KY5QswGYAJ6GyojTMn5qAqmlvTUUaXWn/preview"
        allow="autoplay">
      </iframe>
    </div>


    <!-- VIDEO 3 -->
    <div class="card">
      <iframe class="video-frame" src="https://drive.google.com/file/d/1A6c4zRwl24onDaNlygp4ujxGlv_I-m2Q/preview"
        allow="autoplay">
      </iframe>
    </div>

    <!-- VIDEO 4 -->
    <div class="card">
      <iframe class="video-frame" src="https://drive.google.com/file/d/16ZeiUbHU_JAQRTTWBDSEsEPeKwPxT-IG/preview"
        allow="autoplay">
      </iframe>
    </div>

    <!-- VIDEO 1 -->

  </div>

</body>

</html>
